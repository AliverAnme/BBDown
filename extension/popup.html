<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
body{width:420px;font:12px monospace;margin:0;padding:12px;background:#1a1a2e;color:#e0e0e0}
h2{color:#00d4ff;margin:0 0 8px}
.key-row{background:#16213e;border-radius:4px;padding:8px;margin:4px 0;font-size:11px}
.key-row .kid{color:#888}
.key-row .key{color:#00ff88;word-break:break-all}
.btn{display:inline-block;background:#00d4ff;color:#000;border:none;padding:4px 10px;border-radius:3px;cursor:pointer;font:11px monospace;margin:2px}
.btn:hover{background:#00b8e6}
.btn.danger{background:#ff4757;color:#fff}
.cmd{background:#0a0a1a;color:#aaa;padding:6px;border-radius:3px;margin:6px 0;word-break:break-all;max-height:120px;overflow-y:auto}
.empty{padding:20px;text-align:center;color:#555}
.tabs{display:flex;margin:0 0 8px}
.tab{padding:6px 12px;cursor:pointer;border-radius:4px 4px 0 0;margin-right:2px;background:#16213e}
.tab.active{background:#00d4ff;color:#000}
.count{color:#0af;font-size:10px}
</style></head>
<body>
<h2>BBDown DRM Keys</h2>
<div id="content"></div>
<div id="actions" style="margin-top:8px"></div>
<script src="popup.js"></script>
</body>
</html>
